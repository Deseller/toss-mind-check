<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>마음 진단서 (Mind Check)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.toss.im/ait/sdk/v2/index.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="app" class="p-6 max-w-md mx-auto w-full min-h-screen flex flex-col justify-center">
        <div id="display-area" class="bg-white rounded-3xl shadow-xl p-8 transition-all duration-500">
            <div id="step-start" class="text-center">
                <div class="inline-block p-4 bg-blue-100 rounded-2xl mb-6 text-2xl">🔍</div>
                <h1 class="text-3xl font-extrabold text-slate-900 mb-2">마음 진단서</h1>
                <p class="text-slate-500 mb-10 leading-relaxed">뇌과학 정밀 문항으로 분석하는<br>나의 자존감 건강 상태</p>
                <button onclick="startFreeTest()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">무료 진단 시작하기</button>
            </div>
        </div>
    </div>

    <script>
        const freeQuestions = [
            { q: "작은 실수에도 '나는 왜 이럴까'하며 자책하시나요?", a: ["자주 그래요", "가끔요", "안 그래요"] },
            { q: "남의 눈치를 보느라 내 의견을 숨기곤 하나요?", a: ["항상 그래요", "종종요", "솔직한 편이에요"] },
            { q: "거울 속 내 모습이 마음에 들지 않아 속상한가요?", a: ["자주 그래요", "가끔요", "만족해요"] }
        ];

        let selectedQuestions = [];
        let currentIdx = 0;

        function startFreeTest() {
            selectedQuestions = freeQuestions.sort(() => 0.5 - Math.random()).slice(0, 3);
            currentIdx = 0;
            showQuestion();
        }

        function showQuestion() {
            const data = selectedQuestions[currentIdx];
            const progress = ((currentIdx + 1) / 3) * 100;
            document.getElementById('display-area').innerHTML = `
                <div class="animate-in fade-in slide-in-from-right duration-500">
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mb-8 overflow-hidden">
                        <div class="bg-[#3182f6] h-full transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    <div class="text-[#3182f6] font-bold text-xs mb-2 tracking-widest uppercase">FREE CHECK ${currentIdx + 1}/3</div>
                    <h2 class="text-2xl font-bold mb-8 text-slate-800 leading-tight">${data.q}</h2>
                    <div class="space-y-4">
                        ${data.a.map(ans => `<button onclick="nextFreeStep()" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-semibold text-slate-700 hover:bg-blue-50 border-2 border-transparent transition shadow-sm">${ans}</button>`).join('')}
                    </div>
                </div>
            `;
        }

        function nextFreeStep() {
            currentIdx++;
            if (currentIdx < 3) showQuestion();
            else showFreeResult();
        }

        function showFreeResult() {
            // 마케터의 한 끗: 결제 전 10줄 이상의 고밀도 분석
            document.getElementById('display-area').innerHTML = `
                <div class="animate-in zoom-in duration-300">
                    <h2 class="text-2xl font-bold mb-6 text-slate-900">무료 진단 결과</h2>
                    <div class="bg-blue-50 p-6 rounded-2xl mb-8 border border-blue-100 text-left overflow-y-auto max-h-64 custom-scrollbar">
                        <p class="text-slate-700 text-sm leading-relaxed mb-4 font-medium">
                            당신의 뇌는 현재 <span class="font-bold text-[#3182f6]">'심리적 방어 모드'</span>가 강하게 작동 중입니다. 이는 무의식적인 불안으로부터 자신을 보호하기 위해 뇌가 에너지를 차단한 상태를 의미합니다.
                        </p>
                        <p class="text-slate-600 text-xs leading-relaxed mb-4">
                            분석 데이터에 따르면, 당신의 전두엽은 일상적인 스트레스를 이성적으로 처리하려 노력하고 있지만 편도체의 과도한 위협 신호로 인해 기능이 일시적으로 위축된 것으로 보입니다. 이 상태가 지속될 경우 사소한 결정에도 과도한 에너지를 소모하게 되며 점진적인 무력감을 느낄 수 있습니다.
                        </p>
                        <p class="text-slate-600 text-xs leading-relaxed">
                            당신은 현재 타인의 평가보다 내면의 엄격한 검열관으로 인해 스스로를 소모하고 있을 확률이 큽니다. 이것은 단순한 성격 문제가 아니라 호르몬의 일시적 불균형일 뿐이며 충분히 리셋 가능합니다.
                        </p>
                    </div>
                    <button onclick="requestPayment()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg mb-4 shadow-lg">1,900원에 심층 상담 시작하기</button>
                    <p class="text-slate-400 text-[11px] text-center px-4 leading-relaxed">50가지 전문 문항과 AI 심층 솔루션이 제공됩니다.</p>
                </div>
            `;
        }

        async function requestPayment() {
            const isToss = /Toss/i.test(navigator.userAgent);
            if (!isToss) {
                alert("웹 미리보기: 결제 성공 모드로 전환합니다.");
                showFinalStep();
                return;
            }
            try {
                const result = await window.toss.pay({
                    amount: 1900,
                    orderId: "order_" + Math.random().toString(36).substring(2, 11),
                    orderName: "마음 진단서 심층 상담권",
                });
                if (result) showFinalStep();
            } catch (error) {
                alert("결제가 완료되지 않았습니다.");
            }
        }

        function showFinalStep() {
            // 마케터의 한 끗: 결제 완료 직후에도 10줄 이상의 신뢰 문구 배치
            document.getElementById('display-area').innerHTML = `
                <div class="text-center animate-in slide-in-from-bottom duration-500">
                    <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">✨</div>
                    <h2 class="text-2xl font-bold mb-4 text-slate-900">맞춤 처방 활성화</h2>
                    <div class="bg-slate-50 p-6 rounded-2xl mb-8 border border-slate-100 text-left">
                        <p class="text-slate-700 text-sm leading-relaxed mb-4 font-semibold">
                            결제가 확인되었습니다. 이제 당신의 뇌 회로를 회복시킬 <span class="text-[#3182f6]">AI</span>의 첫 번째 질문을 기다려주세요.
                        </p>
                        <p class="text-slate-600 text-xs leading-relaxed">
                            지금부터 진행될 50가지 전문 심층 상담은 당신의 무의식 속에 숨겨진 핵심 신념을 찾아내어 뇌과학적 관점에서 재설계하는 과정입니다. 상담이 시작되면 솔직한 답변을 통해 당신의 마음을 정밀하게 투사해 주세요. 당신의 자존감 회복을 위한 가장 안전한 대화가 곧 시작됩니다.
                        </p>
                    </div>
                    <button onclick="alert('곧 상담 기능이 연결됩니다!')" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">상담 시작하기</button>
                </div>
            `;
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</body>
</html>
