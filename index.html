<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>마음 진단서 (Mind Check)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.toss.im/ait/sdk/v2/index.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="app" class="p-6 max-w-md mx-auto w-full min-h-screen flex flex-col justify-center">
        <div id="display-area" class="bg-white rounded-3xl shadow-xl p-8 transition-all duration-500">
            <div id="step-start" class="text-center">
                <div class="inline-block p-4 bg-blue-100 rounded-2xl mb-6 text-2xl">🔍</div>
                <h1 class="text-3xl font-extrabold text-slate-900 mb-2">마음 진단서</h1>
                <p class="text-slate-500 mb-10 leading-relaxed">뇌과학으로 분석하는<br>나의 자존감 정밀 검진</p>
                <button onclick="startFreeTest()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">무료 진단 시작하기</button>
            </div>
        </div>
    </div>

    <script>
        // 무료 질문 20종 (랜덤 3개 추출용)
        const freeQuestions = [
            { q: "작은 실수에도 '나는 왜 이럴까'하며 자책하시나요?", a: ["자주 그래요", "가끔요", "안 그래요"] },
            { q: "남의 눈치를 보느라 내 의견을 숨기곤 하나요?", a: ["항상 그래요", "종종요", "솔직한 편이에요"] },
            { q: "거울 속 내 모습이 마음에 들지 않아 속상한가요?", a: ["자주 그래요", "가끔요", "만족해요"] },
            // ... (중략) 총 20문항
        ];

        // 유료 심층 상담 질문 50종 (무료와 중복 없음)
        const deepQuestions = [
            { q: "성공했을 때 기쁨보다 '다음에도 잘해야 한다'는 압박이 더 큰가요?", a: ["매우 커요", "조금요", "즐기는 편이에요"] },
            { q: "가장 친한 친구에게도 나의 취약한 면을 보여주기 힘든가요?", a: ["절대 못 보여줘요", "노력 중이에요", "편하게 보여줘요"] },
            { q: "어린 시절 부모님의 기대에 부응하지 못했을 때의 공포가 기억나나요?", a: ["선명해요", "어렴풋해요", "기억 안 나요"] },
            { q: "갈등 상황에서 내 목소리를 내기보다 먼저 사과해버리나요?", a: ["항상 그래요", "자주 그래요", "대등하게 대화해요"] },
            { q: "완벽하지 않은 결과물을 내놓느니 아예 포기하는 게 편한가요?", a: ["매우 그래요", "가끔요", "일단 끝내요"] },
            { q: "남들이 나를 과대평가하고 있다는 '가면 증후군'을 느끼나요?", a: ["자주 느껴요", "가끔요", "제 실력이라 믿어요"] },
            { q: "나의 가치가 타인의 인정 여부에 따라 춤을 추나요?", a: ["매우 휘둘려요", "조금요", "중심을 잡아요"] },
            { q: "타인의 부탁을 거절했을 때 며칠 동안 죄책감에 시달리나요?", a: ["심해요", "약간요", "괜찮아요"] },
            { q: "내가 원하는 것보다 남이 원하는 것을 먼저 챙기는 것이 습관인가요?", a: ["완전 제 얘기예요", "종종요", "제 것부터 챙겨요"] },
            { q: "비판을 들으면 '나라는 존재' 자체가 부정당하는 기분이 드나요?", a: ["매우 그래요", "조금요", "피드백으로 느껴요"] }
            // ... (실제 배포 시 50개 리스트를 모두 채울 수 있습니다)
        ];

        let selectedQuestions = [];
        let currentIdx = 0;

        function startFreeTest() {
            selectedQuestions = freeQuestions.sort(() => 0.5 - Math.random()).slice(0, 3);
            currentIdx = 0;
            showQuestion(false);
        }

        function showQuestion(isDeep) {
            const data = selectedQuestions[currentIdx];
            const total = selectedQuestions.length;
            const progress = ((currentIdx + 1) / total) * 100;
            const tag = isDeep ? "DEEP CARE" : "FREE CHECK";

            document.getElementById('display-area').innerHTML = `
                <div class="animate-in fade-in slide-in-from-right duration-500">
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mb-8 overflow-hidden">
                        <div class="bg-[#3182f6] h-full transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    <div class="text-[#3182f6] font-bold text-xs mb-2 tracking-widest uppercase">${tag} ${currentIdx + 1}/${total}</div>
                    <h2 class="text-2xl font-bold mb-8 text-slate-800 leading-tight">${data.q}</h2>
                    <div class="space-y-4">
                        ${data.a.map(ans => `<button onclick="${isDeep ? 'nextDeepStep()' : 'nextFreeStep()'}" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-semibold text-slate-700 hover:bg-blue-50 border-2 border-transparent transition shadow-sm">${ans}</button>`).join('')}
                    </div>
                </div>
            `;
        }

        function nextFreeStep() {
            currentIdx++;
            if (currentIdx < 3) showQuestion(false);
            else showFreeResult();
        }

        function showFreeResult() {
            // 유료 전환 유도 리포트
            document.getElementById('display-area').innerHTML = `
                <div class="animate-in zoom-in duration-300">
                    <h2 class="text-2xl font-bold mb-6 text-slate-900">무료 진단 결과</h2>
                    <div class="bg-blue-50 p-6 rounded-2xl mb-8 border border-blue-100 text-left">
                        <p class="text-slate-700 text-sm leading-relaxed">
                            당신의 뇌는 현재 <span class="font-bold text-[#3182f6]">'심리적 방어 모드'</span>가 작동 중입니다. 이는 무의식적인 불안으로부터 자신을 보호하려는 반응입니다.
                        </p>
                    </div>
                    <button onclick="requestPayment()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg mb-4 shadow-lg">1,900원에 심층 상담 시작하기</button>
                    <p class="text-slate-400 text-[11px] text-center px-4">50가지 전문 문항과 AI 심층 솔루션이 제공됩니다.</p>
                </div>
            `;
        }

        async function requestPayment() {
            const isToss = /Toss/i.test(navigator.userAgent);
            if (!isToss) {
                alert("웹 미리보기: 결제 성공 시나리오로 이동합니다.");
                startDeepConsulting();
                return;
            }
            try {
                const result = await window.toss.pay({
                    amount: 1900,
                    orderId: "order_" + Math.random().toString(36).substring(2, 11),
                    orderName: "마음 진단서 심층 상담권",
                });
                if (result) startDeepConsulting();
            } catch (error) {
                alert("결제가 완료되지 않았습니다.");
            }
        }

        function startDeepConsulting() {
            // 유료 결제 직후 50개 질문 중 3개 랜덤 추출하여 깊은 대화 시작
            selectedQuestions = deepQuestions.sort(() => 0.5 - Math.random()).slice(0, 3);
            currentIdx = 0;
            showQuestion(true);
        }

        function nextDeepStep() {
            currentIdx++;
            if (currentIdx < 3) showQuestion(true);
            else showDeepResult();
        }

        function showDeepResult() {
            // 20줄 이상의 전문적인 고밀도 리포트
            document.getElementById('display-area').innerHTML = `
                <div class="animate-in slide-in-from-bottom duration-500">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-1.5 h-6 bg-[#3182f6] rounded-full"></div>
                        <h2 class="text-2xl font-bold text-slate-900">AI 정밀 처방전</h2>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl mb-8 border border-slate-100 max-h-96 overflow-y-auto custom-scrollbar text-sm leading-relaxed text-slate-700">
                        <p class="font-bold text-[#3182f6] mb-2">[1] 뇌과학적 기제 분석</p>
                        당신의 답변 데이터를 분석한 결과, 전두엽의 '실행 기능'이 편도체의 '위협 신호'에 의해 억제되고 있습니다. 이는 단순한 성격 문제가 아니라 호르몬 균형의 일시적 불균형을 의미합니다. 코르티솔 수치가 높게 유지될 경우 자기 효능감이 급격히 저하될 수 있으므로, 현재의 무력감은 뇌가 보내는 '휴식 신호'로 이해해야 합니다.<br><br>
                        
                        <p class="font-bold text-[#3182f6] mb-2">[2] 자존감 심층 프로파일링</p>
                        당신은 '외적 인정'을 동력으로 삼아온 '성취형 자존감'을 보유하고 있습니다. 이 유형은 성과가 좋을 때는 누구보다 강력하지만, 작은 실패나 비판에도 기반이 흔들리는 취약성을 갖습니다. 현재 당신 내면의 '엄격한 비판자'는 당신을 보호하기 위해 비난을 멈추지 않고 있으나, 이는 오히려 회복 탄력성을 저해하고 있습니다.<br><br>

                        <p class="font-bold text-[#3182f6] mb-2">[3] 행동 인지적 솔루션</p>
                        첫째, 하루에 한 번 '의도적인 불완전함'을 연습하세요. 완벽하지 않은 결과를 스스로 허용할 때 편도체의 예민도가 낮아집니다. 둘째, '감정 이름 붙이기(Affect Labeling)'를 시도하세요. 불안을 느낄 때 "나는 지금 불안하다"라고 명명하는 것만으로도 전두엽이 활성화되어 감정을 조절할 수 있게 됩니다.<br><br>

                        <p class="font-bold text-[#3182f6] mb-2">[4] AI의 최종 제언</p>
                        당신은 이미 충분히 애쓰고 있습니다. 자존감은 '높이는 것'이 아니라 '받아들이는 것'에서 시작됩니다. 오늘의 진단이 당신의 뇌 회로에 새로운 길을 내는 작은 시작점이 되길 바랍니다. 당신은 그 자체로 온전하며, 회복될 자격이 충분합니다.
                    </div>
                    <button onclick="location.reload()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold">진단 완료 (메인으로)</button>
                </div>
            `;
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</body>
</html>
