<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>마음 진단서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.toss.im/ait/sdk/v2/index.js"></script>
</head>
<body class="bg-white min-h-screen">
    <div id="app" class="p-6 max-w-md mx-auto w-full min-h-screen flex flex-col">
        <div id="display-area" class="flex-1 flex flex-col justify-center">
            <div id="step-start" class="text-center">
                <h1 class="text-3xl font-extrabold text-slate-900 mb-2">마음 진단서</h1>
                <p class="text-slate-500 mb-10">뇌과학 기반 자존감 정밀 검사</p>
                <button onclick="startTest()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">무료 진단 시작하기</button>
            </div>
        </div>
    </div>

    <script>
        const allQuestions = [
            { q: "작은 실수에도 '나는 왜 이럴까'하며 자책하시나요?", a: ["매우 자주", "가끔요", "안 그래요"] },
            { q: "남의 눈치를 보느라 내 의견을 숨길 때가 많나요?", a: ["항상 그래요", "종종요", "솔직한 편이에요"] },
            { q: "과거의 잘못이 자꾸 떠올라 괴로울 때가 있나요?", a: ["매우 자주요", "종종요", "금방 잊어요"] },
            { q: "실패했을 때 '역시 난 안 돼'라고 단정 짓나요?", a: ["항상 그래요", "종종요", "다시 시도해요"] }
        ];

        let selectedQuestions = [];
        let currentIdx = 0;

        function startTest() {
            selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 3);
            currentIdx = 0;
            showQuestion();
        }

        function showQuestion() {
            const data = selectedQuestions[currentIdx];
            const html = `
                <div class="animate-in fade-in duration-500">
                    <div class="text-[#3182f6] font-bold text-sm mb-2">질문 ${currentIdx + 1}/3</div>
                    <h2 class="text-2xl font-bold mb-8 text-slate-800 leading-snug">${data.q}</h2>
                    <div class="space-y-3">
                        ${data.a.map(ans => `<button onclick="nextStep()" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-semibold text-slate-700 active:bg-slate-100">${ans}</button>`).join('')}
                    </div>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }

        function nextStep() {
            currentIdx++;
            if (currentIdx < 3) showQuestion();
            else showResult();
        }

        function showResult() {
            // 마케터의 전략: 텍스트 양을 늘려 가치를 증명함 (약 15줄 분량)
            const html = `
                <div class="animate-in zoom-in duration-300">
                    <h2 class="text-2xl font-bold mb-6 text-slate-900">정밀 진단 리포트</h2>
                    <div class="bg-blue-50 p-6 rounded-2xl mb-8 border border-blue-100 text-left overflow-y-auto max-h-[400px]">
                        <p class="text-[#3182f6] font-bold mb-3">● 뇌과학적 관점의 현재 상태</p>
                        <p class="text-slate-700 text-sm leading-relaxed mb-4">
                            당신의 답변을 종합 분석한 결과, 현재 뇌의 <strong>'편도체(Amygdala)'</strong>가 과도하게 활성화되어 있습니다. 이는 심리적 위협을 느낄 때 나타나는 자연스러운 방어 기제이지만, 지속될 경우 이성적 사고를 담당하는 <strong>'전두엽'</strong>의 기능을 일시적으로 저하시킵니다.
                        </p>
                        <p class="text-[#3182f6] font-bold mb-3">● 심리학적 분석 결과</p>
                        <p class="text-slate-700 text-sm leading-relaxed mb-4">
                            당신은 타인의 시선보다 '내면의 엄격한 잣대'로 인해 스스로를 소모하고 있을 가능성이 큽니다. 이러한 <strong>'완벽주의적 자책'</strong>은 도파민 회로의 보상 체계를 무너뜨려, 작은 성취에도 기쁨을 느끼지 못하게 방해하고 있습니다.
                        </p>
                        <p class="text-[#3182f6] font-bold mb-3">● 향후 예상되는 흐름</p>
                        <p class="text-slate-700 text-sm leading-relaxed">
                            현재 상태를 방치할 경우 뇌는 에너지를 보존하기 위해 '무기력'이라는 보호막을 칠 수 있습니다. 지금 가장 필요한 것은 뇌 회로의 <strong>'리셋'</strong>입니다. 당신의 잘못이 아닙니다. 이것은 호르몬과 신경전달물질의 불균형일 뿐이며, 충분히 회복 가능합니다.
                        </p>
                    </div>
                    <button onclick="requestPayment()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg mb-4">나만을 위한 1:1 처방전 받기</button>
                    <p class="text-slate-400 text-xs text-center mb-6">결제 시 전문가 수준의 심층 가이드와 추가 상담이 제공됩니다.</p>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }

        async function requestPayment() {
            const isToss = /Toss/i.test(navigator.userAgent);
            if (!isToss) {
                alert("웹 미리보기: 결제 성공 시나리오로 이동합니다.");
                showConsultingStart();
                return;
            }
            try {
                const result = await window.toss.pay({
                    amount: 1900,
                    orderId: "order_" + Math.random().toString(36).substring(2, 11),
                    orderName: "마음 진단서 심층 처방전",
                });
                if (result) showConsultingStart();
            } catch (error) {
                alert("결제가 완료되지 않았습니다.");
            }
        }

        function showConsultingStart() {
            document.getElementById('display-area').innerHTML = `
                <div class="text-center animate-in slide-in-from-bottom duration-500">
                    <div class="inline-block p-4 bg-green-100 rounded-full mb-6">✨</div>
                    <h2 class="text-2xl font-bold mb-4">맞춤 처방 활성화</h2>
                    <p class="text-slate-600 mb-10 leading-relaxed">
                        결제가 확인되었습니다. 이제 당신의 뇌 회로를 회복시킬 <strong>Gemini AI</strong>의 첫 번째 질문을 기다려주세요.
                    </p>
                    <button onclick="alert('곧 상담 기능이 연결됩니다!')" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">상담 시작하기</button>
                </div>
            `;
        }
    </script>
</body>
</html>
