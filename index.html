<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>마음 진단서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.toss.im/ait/sdk/v2/index.js"></script>
</head>
<body class="bg-white min-h-screen flex flex-col">
    <div id="app" class="flex-1 flex flex-col p-6 max-w-md mx-auto w-full">
        <div id="display-area" class="flex-1 flex flex-col justify-between">
            <div id="step-start">
                <h1 class="text-3xl font-extrabold text-slate-900 mb-2">마음 진단서</h1>
                <p class="text-slate-500 mb-8 font-medium">뇌과학으로 당신의 자존감을 체크합니다.</p>
                <div class="bg-blue-50 p-5 rounded-2xl mb-10 border border-blue-100">
                    <p class="text-blue-700 text-sm leading-relaxed font-semibold">
                        전문 문항 20종 중 당신에게 꼭 필요한 3가지 질문을 랜덤으로 추출하여 무료 진단을 시작합니다.
                    </p>
                </div>
                <button onclick="startTest()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">무료 진단 시작하기</button>
            </div>
        </div>
    </div>

    <script>
        // 마케터가 엄선한 자존감 진단 20문항
        const allQuestions = [
            { q: "작은 실수에도 '나는 왜 이럴까'하며 자책하시나요?", a: ["자주 그래요", "가끔요", "안 그래요"] },
            { q: "남의 눈치를 보느라 내 의견을 숨길 때가 많나요?", a: ["항상 그래요", "종종요", "솔직한 편이에요"] },
            { q: "거울 속 내 모습이 마음에 들지 않아 속상한가요?", a: ["자주 그래요", "가끔요", "만족해요"] },
            { q: "나보다 잘난 사람을 보면 질투보다 자괴감이 드나요?", a: ["심하게 느껴요", "조금요", "자극을 받아요"] },
            { q: "칭찬을 들어도 '운이 좋았을 뿐'이라고 치부하나요?", a: ["매우 그래요", "약간요", "감사히 받아요"] },
            { q: "새로운 도전을 할 때 실패할까 봐 잠을 설치나요?", a: ["자주 그래요", "가끔요", "설레는 편이에요"] },
            { q: "사람들이 나를 싫어할까 봐 먼저 연락하기 힘든가요?", a: ["매우 힘들어요", "가끔요", "편하게 해요"] },
            { q: "과거의 잘못이 자꾸 떠올라 괴로울 때가 있나요?", a: ["매우 자주요", "종종요", "금방 잊어요"] },
            { q: "내가 결정한 일에 대해 확신이 없어 자주 묻나요?", a: ["항상 물어요", "종종요", "스스로 결정해요"] },
            { q: "아무리 노력해도 상황이 나아지지 않을 것 같나요?", a: ["매우 그래요", "조금요", "희망적이에요"] },
            { q: "내 감정을 남에게 솔직히 말하는 게 두려운가요?", a: ["매우 두려워요", "약간요", "편해요"] },
            { q: "SNS 속 사람들의 일상이 부러워 우울해지나요?", a: ["자주 그래요", "가끔요", "신경 안 써요"] },
            { q: "남에게 부탁하는 것이 미안해서 혼자 다 떠맡나요?", a: ["항상 그래요", "종종요", "부탁 잘 해요"] },
            { q: "내 장점보다는 단점이 먼저 눈에 들어오나요?", a: ["매우 그래요", "보통이에요", "장점을 봐요"] },
            { q: "조금만 피곤해도 '나는 쓸모없다'는 생각이 드나요?", a: ["자주 그래요", "가끔요", "안 그래요"] },
            { q: "회의나 모임에서 내 목소리를 내기가 어렵나요?", a: ["매우 어려워요", "조금요", "자신 있어요"] },
            { q: "상처받는 것이 두려워 깊은 관계를 피하시나요?", a: ["매우 그래요", "약간요", "안 그래요"] },
            { q: "오늘 하루를 돌아볼 때 후회되는 장면만 남나요?", a: ["항상 그래요", "종종요", "만족스러워요"] },
            { q: "나 자신을 사랑한다는 말이 어색하게 느껴지나요?", a: ["매우 어색해요", "조금요", "익숙해요"] },
            { q: "실패했을 때 '역시 난 안 돼'라고 단정 짓나요?", a: ["항상 그래요", "종종요", "다시 시도해요"] }
        ];

        let selectedQuestions = [];
        let currentIdx = 0;

        function startTest() {
            selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 3);
            currentIdx = 0;
            showQuestion();
        }

        function showQuestion() {
            const data = selectedQuestions[currentIdx];
            const html = `
                <div class="animate-in fade-in slide-in-from-right duration-500">
                    <div class="mb-6 bg-slate-100 h-1.5 w-full rounded-full overflow-hidden">
                        <div class="bg-[#3182f6] h-full transition-all duration-500" style="width: ${(currentIdx+1)*33.3}%"></div>
                    </div>
                    <div class="text-[#3182f6] font-bold text-xs mb-2 uppercase">Mind Check ${currentIdx + 1}/3</div>
                    <h2 class="text-2xl font-bold mb-8 text-slate-800 leading-tight">${data.q}</h2>
                    <div class="space-y-3">
                        ${data.a.map(ans => `<button onclick="nextStep()" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-semibold text-slate-700 active:bg-slate-100 shadow-sm">${ans}</button>`).join('')}
                    </div>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }

        function nextStep() {
            currentIdx++;
            if (currentIdx < 3) showQuestion();
            else showResult();
        }

        function showResult() {
            const html = `
                <div class="text-center animate-in zoom-in duration-300">
                    <div class="inline-block p-4 bg-blue-100 rounded-3xl mb-6 text-2xl">🧠</div>
                    <h2 class="text-2xl font-bold mb-4 text-slate-900">진단 결과 생성 완료</h2>
                    <div class="bg-blue-50 p-6 rounded-2xl mb-8 text-left border border-blue-100">
                        <p class="text-slate-700 leading-relaxed text-sm">
                            당신의 답변을 분석한 결과, 현재 <span class="text-red-500 font-bold">'심리적 방어 기제 과부하'</span> 상태가 감지되었습니다. 뇌과학 처방전에서 자세한 원인을 확인하세요.
                        </p>
                    </div>
                    <button onclick="requestPayment()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-xl">심층 처방전 받기 (1,900원)</button>
                    <button onclick="location.reload()" class="mt-4 text-slate-400 text-sm font-medium">다시 진단하기</button>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }

        async function requestPayment() {
            try {
                // 토스 미니앱 전용 결제 호출
                const result = await window.toss.pay({
                    amount: 1900,
                    orderId: "order_" + Math.random().toString(36).substring(2, 11),
                    orderName: "마음 진단서 심층 처방전",
                });
                
                // 결제 완료 후 화면 전환
                if (result) {
                    showConsultingStart();
                }
            } catch (error) {
                console.error("결제 실패:", error);
                alert("결제가 완료되지 않았습니다. 다시 시도해 주세요.");
            }
        }

        function showConsultingStart() {
            const html = `
                <div class="text-center animate-in slide-in-from-bottom duration-500">
                    <div class="inline-block p-4 bg-green-100 rounded-full mb-6">✨</div>
                    <h2 class="text-2xl font-bold mb-4 text-slate-900">결제 완료</h2>
                    <p class="text-slate-600 mb-8 leading-relaxed">
                        이제 당신의 맞춤형 처방전이 활성화되었습니다.<br>
                        <strong>Gemini AI</strong>와 심층 상담을 시작합니다.
                    </p>
                    <button onclick="alert('곧 상담 기능이 연결됩니다!')" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">상담 시작하기</button>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }
    </script>
</body>
</html>
