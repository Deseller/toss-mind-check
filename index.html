<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>마음 진단서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.toss.im/ait/sdk/v2/index.js"></script>
</head>
<body class="bg-white min-h-screen">
    <div id="app" class="p-6 max-w-md mx-auto w-full min-h-screen flex flex-col justify-between">
        <div id="display-area" class="flex-1 flex flex-col justify-center">
            <div id="step-start" class="text-center">
                <h1 class="text-3xl font-extrabold text-slate-900 mb-2">마음 진단서</h1>
                <p class="text-slate-500 mb-10">뇌과학 기반 자존감 정밀 검사</p>
                <button onclick="startTest()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">무료 진단 시작하기</button>
            </div>
        </div>
    </div>

    <script>
        // 20개 랜덤 질문 로직 유지
        const allQuestions = [
            { q: "작은 실수에도 '나는 왜 이럴까'하며 자책하시나요?", a: ["자주 그래요", "가끔요", "안 그래요"] },
            { q: "남의 눈치를 보느라 내 의견을 숨길 때가 많나요?", a: ["항상 그래요", "종종요", "솔직한 편이에요"] },
            { q: "과거의 잘못이 자꾸 떠올라 괴로울 때가 있나요?", a: ["매우 자주요", "종종요", "금방 잊어요"] }
            // ... (중략)
        ];

        let selectedQuestions = [];
        let currentIdx = 0;

        function startTest() {
            selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 3);
            currentIdx = 0;
            showQuestion();
        }

        function showQuestion() {
            const data = selectedQuestions[currentIdx];
            const html = `
                <div class="animate-in fade-in duration-500">
                    <div class="text-[#3182f6] font-bold text-sm mb-2">질문 ${currentIdx + 1}/3</div>
                    <h2 class="text-2xl font-bold mb-8 text-slate-800">${data.q}</h2>
                    <div class="space-y-3">
                        ${data.a.map(ans => `<button onclick="nextStep()" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-semibold text-slate-700 active:bg-slate-100">${ans}</button>`).join('')}
                    </div>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }

        function nextStep() {
            currentIdx++;
            if (currentIdx < 3) showQuestion();
            else showResult();
        }

        function showResult() {
            const html = `
                <div class="text-center animate-in zoom-in duration-300">
                    <h2 class="text-2xl font-bold mb-4 text-slate-900">진단 완료</h2>
                    <div class="bg-blue-50 p-6 rounded-2xl mb-8 border border-blue-100 text-left">
                        <p class="text-slate-700 text-sm leading-relaxed">
                            분석 결과 당신의 뇌는 현재 <span class="font-bold text-[#3182f6]">'방어 기제 활성화'</span> 상태입니다.
                        </p>
                    </div>
                    <button onclick="requestPayment()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg mb-4">심층 처방전 받기 (1,900원)</button>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }

        async function requestPayment() {
            // 토스 앱 환경인지 체크
            const isToss = /Toss/i.test(navigator.userAgent);

            if (!isToss) {
                // 일반 웹(크롬 등)에서는 결제 성공을 가정하고 바로 화면 전환
                alert("웹 미리보기 모드: 결제 성공을 가정하고 상담으로 이동합니다.");
                showConsultingStart();
                return;
            }

            try {
                const result = await window.toss.pay({
                    amount: 1900,
                    orderId: "order_" + Math.random().toString(36).substring(2, 11),
                    orderName: "마음 진단서 심층 처방전",
                });
                if (result) showConsultingStart();
            } catch (error) {
                alert("결제가 완료되지 않았습니다. 실제 토스 앱에서 확인해 주세요.");
            }
        }

        function showConsultingStart() {
            document.getElementById('display-area').innerHTML = `
                <div class="text-center">
                    <h2 class="text-2xl font-bold mb-4">전문 처방 시작</h2>
                    <p class="text-slate-600 mb-8">이제 Gemini AI와 대화를 시작합니다.</p>
                    <button onclick="alert('Gemini API 연결 단계입니다.')" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg">상담 시작하기</button>
                </div>
            `;
        }
    </script>
</body>
</html>
