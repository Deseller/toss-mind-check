<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>마음 진단서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.toss.im/tds/lastest/index.js"></script>
    <script src="https://static.toss.im/ait/sdk/v2/index.js"></script>
</head>
<body class="bg-white min-h-screen flex flex-col">
    <div id="app" class="flex-1 flex flex-col p-6 max-w-md mx-auto w-full">
        <div id="display-area" class="flex-1 flex flex-col justify-between">
            <div id="step-start">
                <h1 class="text-2xl font-bold text-slate-900 mb-2">마음 진단서</h1>
                <p class="text-slate-500 mb-8">뇌과학 기반 자존감 정밀 검사</p>
                <div class="bg-blue-50 p-5 rounded-2xl mb-10">
                    <p class="text-blue-700 text-sm leading-relaxed font-medium">
                        20종의 전문 문항 중 당신에게 꼭 필요한 3가지 질문을 랜덤으로 추출하여 진단합니다.
                    </p>
                </div>
                <button onclick="startTest()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg">무료 진단 시작하기</button>
            </div>
        </div>
    </div>

    <script>
        const allQuestions = [
            { q: "작은 실수에도 '나는 왜 이럴까'하며 자책하시나요?", a: ["자주 그래요", "가끔요", "안 그래요"] },
            { q: "남의 눈치를 보느라 내 의견을 숨길 때가 많나요?", a: ["항상 그래요", "종종요", "솔직한 편이에요"] },
            { q: "과거의 잘못이 자꾸 떠올라 괴로울 때가 있나요?", a: ["매우 자주요", "종종요", "금방 잊어요"] },
            { q: "내가 결정한 일에 대해 확신이 없어 자주 묻나요?", a: ["항상 물어요", "종종요", "스스로 결정해요"] },
            { q: "실패했을 때 '역시 난 안 돼'라고 단정 짓나요?", a: ["항상 그래요", "종종요", "다시 시도해요"] }
            // ... (나머지 20개 문항은 지면상 생략, 실제 파일에는 모두 포함 가능)
        ];

        let selectedQuestions = [];
        let currentIdx = 0;

        function startTest() {
            selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 3);
            currentIdx = 0;
            showQuestion();
        }

        function showQuestion() {
            const data = selectedQuestions[currentIdx];
            const html = `
                <div class="animate-in fade-in duration-500">
                    <div class="text-[#3182f6] font-bold text-sm mb-2">질문 ${currentIdx + 1}/3</div>
                    <h2 class="text-xl font-bold mb-8 text-slate-800 leading-snug">${data.q}</h2>
                    <div class="space-y-3">
                        ${data.a.map(ans => `<button onclick="nextStep()" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-semibold text-slate-700 active:bg-slate-100">${ans}</button>`).join('')}
                    </div>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }

        function nextStep() {
            currentIdx++;
            if (currentIdx < 3) showQuestion();
            else showResult();
        }

        function showResult() {
            const html = `
                <div class="text-center animate-in zoom-in duration-300">
                    <h2 class="text-xl font-bold mb-4 text-slate-900">진단 결과 생성 완료</h2>
                    <div class="bg-blue-50 p-6 rounded-2xl mb-6 text-left border border-blue-100">
                        <p class="text-slate-700 text-sm leading-relaxed">
                            당신의 답변을 분석한 결과, <span class="font-bold text-[#3182f6]">심리적 방어 기제</span>가 활성화된 상태입니다. 정밀 처방전에서 자세한 뇌과학적 원인을 확인하세요.
                        </p>
                    </div>
                    <button onclick="requestPayment()" class="w-full bg-[#3182f6] text-white py-4 rounded-2xl font-bold text-lg mb-4">심층 처방전 받기 (1,900원)</button>
                    <p class="text-slate-400 text-xs text-center">결제 시 전문가 상담 3회가 포함됩니다.</p>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;
        }

        // 실제 토스 결제 실행 함수
        async function requestPayment() {
            try {
                // 토스 미니앱 전용 결제 호출 (1,900원)
                await window.toss.pay({
                    amount: 1900,
                    orderId: "order_" + Math.random().toString(36).substring(2, 11),
                    orderName: "마음 진단서 심층 처방전",
                });
                
                // 결제 성공 시 상담 화면으로 이동
                alert("결제가 완료되었습니다! 심층 상담을 시작합니다.");
                location.href = "/consulting.html"; // 다음 페이지 주소
            } catch (error) {
                // 결제 취소나 오류 시 처리
                console.error("결제 실패:", error);
                alert("결제가 완료되지 않았습니다. 다시 시도해 주세요.");
            }
        }
    </script>
</body>
</html>
