<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음 진단서 미리보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl overflow-hidden p-8">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-2">마음 진단서</h1>
        <p class="text-slate-500 mb-8 font-medium">뇌과학으로 당신의 자존감을 체크합니다.</p>
        
        <div id="content" class="space-y-6">
            <div class="bg-blue-50 p-6 rounded-2xl">
                <p class="text-blue-700 leading-relaxed">
                    여기는 테스트 화면입니다. <br>
                    실제 토스 앱에 올리기 전 디자인을 확인하세요!
                </p>
            </div>
            <button onclick="alert('결제창이 뜹니다 (1,900원)')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 transition">
                무료 진단 시작하기
            </button>
        </div>
    </div>
</body>
</html>
